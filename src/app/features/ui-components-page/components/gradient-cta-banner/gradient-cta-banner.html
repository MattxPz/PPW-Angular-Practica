<section class="bg-linear-to-br from-sky-100 to-sky-200 rounded-3xl p-6 shadow-xl">
  <p class="text-xs font-bold uppercase tracking-[0.3em] text-sky-900">{{ eyebrow() }}</p>
  <h3 class="mt-2 text-2xl font-black tracking-tight text-slate-900">{{ title() }}</h3>
  <p class="mt-2 max-w-xl text-sm text-slate-800">{{ description() }}</p>
  <button class="btn btn-sm mt-4 border-none bg-slate-300-600 text-slate-900 hover:bg-sky-700">
    {{ actionLabel() }}
  </button>
</section>
