<header class="header">
    <h1>{{brand()}}</h1>
    <div>
        <button (click)="changeBrand()">
            Modificar Titulo
        </button>
        <button (click)="resetBrand()" [disabled] = "brand() === 'ppw-angular'">
            Resetear Titulo
        </button>
        <button (click)="toggleInfo()">
            {{toggleLabel()}}
        </button>
    </div>



    @if(showInfo()){
        <h3>Show info es TRUE</h3>
    }
</header>
