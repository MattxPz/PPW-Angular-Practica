<footer>

  <!-- uppercase -->
  <p>{{ nombre | uppercase }}</p>

  <!-- lowercase -->
  <p>{{ mensaje | lowercase }}</p>

  <!-- titlecase -->
  <p>{{ mensaje | titlecase }}</p>

  <!-- date -->
  <p>{{ fecha | date:'fullDate' }}</p>

  <!-- currency -->
  <p>{{ precio | currency:'USD' }}</p>

  <!-- percent -->
  <p>{{ porcentaje | percent }}</p>

</footer>
